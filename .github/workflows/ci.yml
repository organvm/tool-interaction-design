name: CI

on:
  push:
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Prepare doctor corpus
        run: |
          mkdir -p .ci-corpus
          cat > .ci-corpus/registry-v2.json <<'JSON'
          {
            "version": "2.0",
            "schema_version": "1",
            "organs": {
              "ORGAN-III": {
                "name": "Commerce",
                "repositories": [
                  {
                    "name": "demo-repo",
                    "promotion_status": "LOCAL",
                    "dependencies": [],
                    "ci_workflow": "ci.yml",
                    "last_validated": "2026-03-04"
                  }
                ]
              }
            }
          }
          JSON
          cat > .ci-corpus/governance-rules.json <<'JSON'
          {
            "version": "1.0",
            "schema_version": "1",
            "organ_requirements": {
              "ORGAN-III": {
                "requires_tests": true,
                "requires_revenue_fields": false
              }
            }
          }
          JSON

      - name: Run tests
        run: pytest -q

      - name: Validate schemas
        run: python tools/validate_schemas.py

      - name: Validate process assets
        run: python tools/validate_process_assets.py

      - name: Run mypy strict baseline
        run: mypy --config-file mypy.ini

      - name: Run release guardrails
        run: python tools/release_guardrails.py

      - name: Run doctor strict
        env:
          ORGANVM_CORPUS_DIR: ${{ github.workspace }}/.ci-corpus
        run: python -m conductor doctor --workflow workflow-dsl.yaml --strict

      - name: Policy Simulation Gate
        env:
          ORGANVM_CORPUS_DIR: ${{ github.workspace }}/.ci-corpus
        run: python -m conductor policy simulate --bundle strict

      - name: Observability Trend Gate
        run: python -m conductor observability report --check

      - name: Dogfood Conductor Action (Doctor)
        uses: ./dist/conductor-action
        env:
          ORGANVM_CORPUS_DIR: ${{ github.workspace }}/.ci-corpus
        with:
          command: 'doctor'
          strict: 'true'

      - name: Run routing benchmark SLA
        run: python benchmarks/benchmark_routing.py --enforce --repeat 30
