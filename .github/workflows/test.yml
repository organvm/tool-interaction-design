name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema pytest hypothesis

      - name: Validate YAML files
        run: |
          python -c "
          import yaml
          for f in ['ontology.yaml', 'routing-matrix.yaml', 'workflow-dsl.yaml']:
              yaml.safe_load(open(f))
              print(f'  OK: {f}')
          "

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Doctor check
        run: |
          python -m conductor doctor --format json
